embodiment_key: fr3duo_m+v
version: "1.0"
description: "IsaacSim physics tuning parameters for dual FR3v2 arms (fixed-base)."

physics:
  base_stiffness_nm_rad: 625.0
  base_damping_nm_s_rad: 0.003
  base_drive_type: acceleration
  solver_position_iterations: 64
  solver_velocity_iterations: 4

arm_default_drive_params:
  stiffness_nm_rad: 625.0
  damping_nm_s_rad: 0.003
  drive_type: acceleration

arm_effort_limits_nm:
  joints_1_through_4: 87.0
  joint_5: 12.0
  joints_6_7: 120.0

scaling_parameters:
  arms:
    stiffness_scale: 0.65
    damping_scale: 1.0
    max_force_scale: 3.0
  grippers:
    stiffness_scale: 1.0
    damping_scale: 1.0
    max_force_scale: 1.0

isaac_joint_drives:
  joint_drive_config: isaac_joint_drives.yaml

controller_manager:
  controller_name: position_passthrough
  controller_manager_topic: /isaac_controller_manager
  controller_manager_node_name: isaac_controller_manager
  update_rate: 240
  arm_prefixes:
    - left
    - right
  robot_types:
    - fr3v2
    - fr3v2
  left_gripper_joint: left_robotiq_85_left_knuckle_joint
  right_gripper_joint: right_robotiq_85_left_knuckle_joint
  gripper_max_effort: 50.0
  gripper_stall_timeout: 0.05
  gripper_goal_tolerance: 0.02

notes: |
  These are IsaacSim-specific tuning values. Joint limits, ranges, and kinematics
  are defined in the URDF files. Scales are applied at runtime to allow easy
  parameter sweeps during optimization.
  
  All joint drive and controller manager configuration is centralized here.
