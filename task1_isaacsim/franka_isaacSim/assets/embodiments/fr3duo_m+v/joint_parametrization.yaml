notes: |
  Joint limits and velocity/effort bounds from Franka FR3v2 datasheet.
  Joints 1-4 are heavy joints (87 Nm max), joints 5-7 are light (12 Nm max).
  Home positions match data_collection_home_pose.yaml (standard Franka "ready" pose).
  Gripper multipliers encode the Robotiq 2F-85 coupled-linkage mechanism.
  USD structure: links are nested in a serial chain under /ai_cell/left_FR3/ and
  /ai_cell/right_FR3/. Each joint prim is a child of its body0 (parent) link prim,
  per USD_7DOF_Arm_Articulation_Guide. Gripper joints remain in /ai_cell/joints/
  (gripper link prims not yet restructured — known non-critical limitation).
