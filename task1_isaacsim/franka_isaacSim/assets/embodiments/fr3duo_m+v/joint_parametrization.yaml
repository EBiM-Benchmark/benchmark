embodiment_key: fr3duo_m+v
version: "1.0"
description: "FR3v2 joint definitions for dual fixed-base arms. Limits from Franka FR3v2 datasheet."

# Convenience anchor — left arm link path prefix
# L0 = /ai_cell/left_FR3/left_fr3v2_link0
# L1 = L0/left_fr3v2_link1  ...  L6 = L5/left_fr3v2_link6

