name: fr3_arm_joint_drives
description: Isaac FR3 single-arm joint-drive parameters for the fr3 embodiment.
asset_path: /workspace/assets/digital_twin_fr3.usd
drive_axis: angular
joint_drives:
  # joints 1–4: heavy (max_force 87 N·m).  ζ = 60 / (2√625) = 1.2 — slightly overdamped.
  fr3v2_joint1:
    prim_path: /ai_cell/joints/fr3v2_joint1
    drive_axis: angular
    drive_type: acceleration
    stiffness: 625.0
    damping: 60.0
    max_force: 87.0
  fr3v2_joint2:
