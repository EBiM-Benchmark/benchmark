embodiment_key: fr3
version: "1.0"
description: "FR3v2 joint definitions for single fixed-base arm. Limits from Franka FR3v2 datasheet."

arm_groups:
  arm:
    arm_name: "FR3v2"
    base_link: fr3v2_link0
    ee_link: fr3v2_link8
    usd_joint_scope: /ai_cell/joints
    controllable_joints:
      - name: fr3v2_joint1
        index: 0
        type: revolute
        axis: z
        usd_prim_path: /ai_cell/joints/fr3v2_joint1
        body0: /ai_cell/fr3v2_link0
        body1: /ai_cell/fr3v2_link1
        limits:
          lower_rad: -2.8973
          upper_rad:  2.8973
        home_position_rad: 0.0
        velocity_limit_rad_s: 2.175
        effort_limit_nm: 87.0

      - name: fr3v2_joint2
        index: 1
        type: revolute
        axis: y
        usd_prim_path: /ai_cell/joints/fr3v2_joint2
        body0: /ai_cell/fr3v2_link1
        body1: /ai_cell/fr3v2_link2
        limits:
          lower_rad: -1.7628
          upper_rad:  1.7628
        home_position_rad: -0.7854
        velocity_limit_rad_s: 2.175
        effort_limit_nm: 87.0

      - name: fr3v2_joint3
        index: 2
        type: revolute
        axis: z
        usd_prim_path: /ai_cell/joints/fr3v2_joint3
        body0: /ai_cell/fr3v2_link2
        body1: /ai_cell/fr3v2_link3
        limits:
          lower_rad: -2.8973
          upper_rad:  2.8973
        home_position_rad: 0.0
        velocity_limit_rad_s: 2.175
        effort_limit_nm: 87.0

      - name: fr3v2_joint4
        index: 3
        type: revolute
        axis: y
        usd_prim_path: /ai_cell/joints/fr3v2_joint4
        body0: /ai_cell/fr3v2_link3
        body1: /ai_cell/fr3v2_link4
        limits:
          lower_rad: -3.0718
          upper_rad: -0.0698
        home_position_rad: -2.3562
        velocity_limit_rad_s: 2.175
        effort_limit_nm: 87.0

      - name: fr3v2_joint5
        index: 4
        type: revolute
        axis: z
        usd_prim_path: /ai_cell/joints/fr3v2_joint5
        body0: /ai_cell/fr3v2_link4
        body1: /ai_cell/fr3v2_link5
        limits:
          lower_rad: -2.8973
          upper_rad:  2.8973
        home_position_rad: 0.0
        velocity_limit_rad_s: 2.61
        effort_limit_nm: 12.0

      - name: fr3v2_joint6
        index: 5
        type: revolute
        axis: y
        usd_prim_path: /ai_cell/joints/fr3v2_joint6
        body0: /ai_cell/fr3v2_link5
        body1: /ai_cell/fr3v2_link6
        limits:
          lower_rad: -0.0175
          upper_rad:  3.7525
        home_position_rad: 1.5708
        velocity_limit_rad_s: 2.61
        effort_limit_nm: 12.0

      - name: fr3v2_joint7
        index: 6
        type: revolute
        axis: z
        usd_prim_path: /ai_cell/joints/fr3v2_joint7
        body0: /ai_cell/fr3v2_link6
        body1: /ai_cell/fr3v2_link7
        limits:
          lower_rad: -2.8973
          upper_rad:  2.8973
        home_position_rad: 0.7854
        velocity_limit_rad_s: 2.61
        effort_limit_nm: 12.0

    gripper:
      type: robotiq_2f85
      driver_joint: robotiq_85_left_knuckle_joint
      open_position_rad: 0.0
      closed_position_rad: 0.804
      all_joints:
        - name: robotiq_85_left_knuckle_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_left_knuckle_joint
          multiplier: 1.0
        - name: robotiq_85_right_knuckle_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_right_knuckle_joint
          multiplier: -1.0
        - name: robotiq_85_left_inner_knuckle_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_left_inner_knuckle_joint
          multiplier: 1.0
        - name: robotiq_85_right_inner_knuckle_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_right_inner_knuckle_joint
          multiplier: -1.0
        - name: robotiq_85_left_finger_tip_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_left_finger_tip_joint
          multiplier: -1.0
        - name: robotiq_85_right_finger_tip_joint
          usd_prim_path: /ai_cell/joints/fr3v2_robotiq_85_right_finger_tip_joint
          multiplier: 1.0

notes: |
  Joint limits and velocity/effort bounds from Franka FR3v2 datasheet.
  Joints 1-4 are heavy joints (87 Nm max), joints 5-7 are light (12 Nm max).
  Home positions match the standard Franka "ready" pose.
  Gripper multipliers encode the Robotiq 2F-85 coupled-linkage mechanism.
  USD joint prim paths follow the Isaac Sim 5.1 flat-scope layout under /ai_cell/joints/.
